<!doctype html>
<html lang="en" style="background-color: var(--sidebar)">
	<head>
		<script>
			/**
			 * Theme Hydration - Ultra-fast zero-flicker theme application
			 * CRITICAL: This must be the FIRST script in <head> to run before any rendering
			 *
			 * Strategy:
			 * 1. Read pre-built CSS string from localStorage (NO LOOP!)
			 * 2. Apply directly using document.write()
			 * 3. Svelte mount later checks server and applies only if different
			 *m
			 * Route Exclusions:
			 * - Certain routes should use system/default theme (no custom theme)
			 * - Must match exclusion logic in themeStore.svelte.ts applyTheme()
			 */
			(function () {
				var STORAGE_KEY = 'quantpm.theme';
				var mode = 'light';
				var cachedCSS = null;

				// Routes that should NOT have custom theme (must match themeStore.svelte.ts)
				var EXCLUDED_ROUTES = ['/login', '/register', '/onboarding', '/plans'];
				var currentPath = window.location.pathname;
				var isExcluded = false;

				// Check if current route is excluded
				for (var i = 0; i < EXCLUDED_ROUTES.length; i++) {
					if (currentPath.indexOf(EXCLUDED_ROUTES[i]) !== -1) {
						isExcluded = true;
						break;
					}
				}

				// Skip theme hydration for excluded routes
				if (isExcluded) {
					console.log('[Theme Hydration] Skipping for excluded route:', currentPath);
					return;
				}

				console.log('[Theme Hydration] Applying for route:', currentPath);

				// Default Quant Orion CSS as fallback (pre-built strings)
				var defaultCSS = {
					light:
						'--background:oklch(1 0 0);--foreground:oklch(0.129 0.042 264.695);--card:oklch(1 0 0);--card-foreground:oklch(0.129 0.042 264.695);--popover:oklch(1 0 0);--popover-foreground:oklch(0.129 0.042 264.695);--primary:oklch(0.208 0.042 265.755);--primary-foreground:oklch(0.984 0.003 247.858);--secondary:oklch(0.968 0.007 247.896);--secondary-foreground:oklch(0.208 0.042 265.755);--muted:oklch(0.968 0.007 247.896);--muted-foreground:oklch(0.554 0.046 257.417);--accent:oklch(0.968 0.007 247.896);--accent-foreground:oklch(0.208 0.042 265.755);--destructive:oklch(0.577 0.245 27.325);--border:oklch(0.929 0.013 255.508);--input:oklch(0.929 0.013 255.508);--ring:oklch(0.704 0.04 256.788);--chart-1:oklch(0.646 0.222 41.116);--chart-2:oklch(0.6 0.118 184.704);--chart-3:oklch(0.398 0.07 227.392);--chart-4:oklch(0.828 0.189 84.429);--chart-5:oklch(0.769 0.188 70.08);--sidebar:oklch(0.984 0.003 247.858);--sidebar-foreground:oklch(0.129 0.042 264.695);--sidebar-primary:oklch(0.208 0.042 265.755);--sidebar-primary-foreground:oklch(0.984 0.003 247.858);--sidebar-accent:oklch(0.968 0.007 247.896);--sidebar-accent-foreground:oklch(0.208 0.042 265.755);--sidebar-border:oklch(0.929 0.013 255.508);--sidebar-ring:oklch(0.704 0.04 256.788);--radius:0.625rem;',
					dark: '--background:oklch(0.129 0.042 264.695);--foreground:oklch(0.984 0.003 247.858);--card:oklch(0.208 0.042 265.755);--card-foreground:oklch(0.984 0.003 247.858);--popover:oklch(0.208 0.042 265.755);--popover-foreground:oklch(0.984 0.003 247.858);--primary:oklch(0.929 0.013 255.508);--primary-foreground:oklch(0.208 0.042 265.755);--secondary:oklch(0.279 0.041 260.031);--secondary-foreground:oklch(0.984 0.003 247.858);--muted:oklch(0.279 0.041 260.031);--muted-foreground:oklch(0.704 0.04 256.788);--accent:oklch(0.279 0.041 260.031);--accent-foreground:oklch(0.984 0.003 247.858);--destructive:oklch(0.704 0.191 22.216);--border:oklch(1 0 0 / 10%);--input:oklch(1 0 0 / 15%);--ring:oklch(0.551 0.027 264.364);--chart-1:oklch(0.488 0.243 264.376);--chart-2:oklch(0.696 0.17 162.48);--chart-3:oklch(0.769 0.188 70.08);--chart-4:oklch(0.627 0.265 303.9);--chart-5:oklch(0.645 0.246 16.439);--sidebar:oklch(0.208 0.042 265.755);--sidebar-foreground:oklch(0.984 0.003 247.858);--sidebar-primary:oklch(0.488 0.243 264.376);--sidebar-primary-foreground:oklch(0.984 0.003 247.858);--sidebar-accent:oklch(0.279 0.041 260.031);--sidebar-accent-foreground:oklch(0.984 0.003 247.858);--sidebar-border:oklch(1 0 0 / 10%);--sidebar-ring:oklch(0.551 0.027 264.364);--radius:0.625rem;'
				};

				try {
					var raw = localStorage.getItem(STORAGE_KEY);
					if (raw) {
						var stored = JSON.parse(raw);
						mode = stored.currentMode === 'dark' ? 'dark' : 'light';

						// Use cached CSS string if available (NO LOOP NEEDED!)
						if (stored.cssCache && stored.cssCache[mode]) {
							cachedCSS = stored.cssCache[mode];
						}
					}
				} catch (e) {}

				// Fallback to default CSS if no cache
				if (!cachedCSS) {
					cachedCSS = defaultCSS[mode];
				}

				// Apply dark class if needed
				if (mode === 'dark') {
					document.documentElement.classList.add('dark');
				}

				// Write CSS immediately - NO LOOP, just string concatenation!
				document.write(
					'<style id="theme-hydration">:root{' + cachedCSS + 'color-scheme:' + mode + '}</style>'
				);
			})();
		</script>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
	</head>
	<body>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
