<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Reminder Preview</title>
    <style>
      /* Mobile Styles  */
      @media only screen and (max-width: 620px) {
        .container {
          width: 100% !important;
        }
        .content {
          padding: 20px !important;
        }
        .col-stack {
          display: block !important;
          width: 100% !important;
          padding-bottom: 10px;
        }
        .stack-border {
          border-left: none !important;
          border-top: 1px solid #e5e7eb;
          padding-left: 0 !important;
          padding-top: 10px;
        }
      }
    </style>
  </head>
  <body
    style="
      background-color: #f4f5f7;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      font-size: 14px;
      line-height: 1.4;
      margin: 0;
      padding: 0;
      -ms-text-size-adjust: 100%;
      -webkit-text-size-adjust: 100%;
    "
  >
    <table
      role="presentation"
      border="0"
      cellpadding="0"
      cellspacing="0"
      class="body"
      style="background-color: #f4f5f7; width: 100%; height: 100vh"
    >
      <tr>
        <td
          style="
            display: block;
            margin: 0 auto !important;
            max-width: 600px;
            padding: 10px;
            width: 600px;
            vertical-align: top;
            padding-top: 40px;
          "
        >
          <div
            class="container"
            style="
              background-color: #ffffff;
              border-radius: 8px;
              overflow: hidden;
              box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
              border-top: 6px solid #6366f1;
            "
          >
            <table
              role="presentation"
              border="0"
              cellpadding="0"
              cellspacing="0"
              style="width: 100%"
            >
              <tr>
                <td class="content" style="padding: 40px 40px 20px 40px; text-align: center">
                  <div
                    style="
                      display: inline-block;
                      background-color: #e0e7ff;
                      border-radius: 50%;
                      padding: 15px;
                      margin-bottom: 20px;
                    "
                  >
                    <span style="font-size: 32px; line-height: 1">⏰</span>
                  </div>
                  <h1
                    style="
                      color: #1f2937;
                      font-size: 24px;
                      font-weight: 700;
                      margin: 0;
                      line-height: 1.2;
                    "
                  >
                    Submit Quarterly Report
                  </h1>
                  <p style="color: #6b7280; font-size: 16px; margin-top: 10px; margin-bottom: 0">
                    Don't forget to attach the financial summary PDF before sending to the board.
                  </p>
                </td>
              </tr>
            </table>

            <table
              role="presentation"
              border="0"
              cellpadding="0"
              cellspacing="0"
              style="width: 100%"
            >
              <tr>
                <td style="padding: 0 40px 30px 40px">
                  <div
                    style="
                      background-color: #f9fafb;
                      border: 1px solid #e5e7eb;
                      border-radius: 8px;
                      padding: 20px;
                    "
                  >
                    <table
                      role="presentation"
                      border="0"
                      cellpadding="0"
                      cellspacing="0"
                      style="width: 100%"
                    >
                      <tr>
                        <td class="col-stack" style="vertical-align: middle; width: 50%">
                          <p
                            style="
                              margin: 0;
                              color: #9ca3af;
                              font-size: 12px;
                              text-transform: uppercase;
                              letter-spacing: 1px;
                              font-weight: 600;
                            "
                          >
                            Date
                          </p>
                          <p
                            style="
                              margin: 5px 0 0 0;
                              color: #1f2937;
                              font-size: 18px;
                              font-weight: 600;
                            "
                          >
                            Fri, Nov 14
                          </p>
                        </td>
                        <td
                          class="col-stack stack-border"
                          style="
                            vertical-align: middle;
                            width: 50%;
                            border-left: 1px solid #e5e7eb;
                            padding-left: 20px;
                          "
                        >
                          <p
                            style="
                              margin: 0;
                              color: #9ca3af;
                              font-size: 12px;
                              text-transform: uppercase;
                              letter-spacing: 1px;
                              font-weight: 600;
                            "
                          >
                            Time
                          </p>
                          <p
                            style="
                              margin: 5px 0 0 0;
                              color: #1f2937;
                              font-size: 18px;
                              font-weight: 600;
                            "
                          >
                            04:30 PM
                          </p>
                        </td>
                      </tr>
                    </table>
                  </div>

                  <div
                    style="
                      margin-top: 20px;
                      background-color: #fffbeb;
                      border: 1px solid #fcd34d;
                      border-radius: 6px;
                      padding: 12px;
                      text-align: center;
                    "
                  >
                    <p style="margin: 0; color: #92400e; font-size: 14px; font-weight: 500">
                      🔔 You are being notified <strong>15 minutes</strong> in advance.
                    </p>
                  </div>
                </td>
              </tr>
            </table>
          </div>

          <div style="padding-top: 20px; color: #9ca3af; font-size: 12px; text-align: center">
            <p style="margin: 0 0 10px 0">Quant Orion &bull; Stay Organized</p>
            <p style="margin: 0">&copy; 2025 Quant Orion. All rights reserved.</p>
          </div>
        </td>
      </tr>
    </table>
  </body>
</html>
